server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
    location /metrics  { proxy_pass http://backend:8000; }
    location /anomaly  { proxy_pass http://backend:8000; }
    location /forecast { proxy_pass http://backend:8000; }
    location /insights { proxy_pass http://backend:8000; }
    location /health   { proxy_pass http://backend:8000; }
    location /ws       {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
